{% extends "base.html" %}
{% block title %}Login — Kovai Lake Guardians{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 form-card">
    <div class="card shadow border-0">
      <div class="card-header bg-success text-white text-center py-3">
        <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Volunteer Login</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   id="{{ field.id_for_label }}"
                   class="form-control {% if field.errors %}is-invalid{% endif %}"
                   {% if field.value %}value="{{ field.value }}"{% endif %}>
            {% for error in field.errors %}
            <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
          {% endfor %}
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
          </div>
        </form>
      </div>
      <div class="card-footer text-center text-muted py-3">
        Don't have an account? <a href="{% url 'volunteers_app:register' %}" class="text-success fw-semibold">Register here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
