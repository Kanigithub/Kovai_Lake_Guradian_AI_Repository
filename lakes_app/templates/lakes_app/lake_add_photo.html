{% extends "base.html" %}
{% block title %}Add Photo — {{ lake.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow border-0">
      <div class="card-header bg-primary text-white py-3">
        <h4 class="mb-0"><i class="fas fa-camera me-2"></i>Add Photo for {{ lake.name }}</h4>
      </div>
      <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Photo Type</label>
            {{ form.photo_type }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Upload Image</label>
            {{ form.image }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Or Image URL</label>
            {{ form.image_url }}
            <div class="form-text">{{ form.image_url.help_text }}</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Caption</label>
            {{ form.caption }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-upload me-2"></i>Add Photo
            </button>
            <a href="{% url 'lakes_app:lake_detail' lake.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
