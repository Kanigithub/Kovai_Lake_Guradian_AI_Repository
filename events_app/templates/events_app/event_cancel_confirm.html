{% extends "base.html" %}
{% block title %}Cancel Registration{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-warning border-2">
      <div class="card-header bg-warning py-3">
        <h4 class="mb-0"><i class="fas fa-times-circle me-2"></i>Cancel Registration</h4>
      </div>
      <div class="card-body p-4 text-center">
        <p class="fs-5">Cancel your registration for <strong>{{ event.title }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-warning">Yes, Cancel Registration</button>
            <a href="{% url 'events_app:event_detail' event.pk %}" class="btn btn-outline-secondary">Keep Registration</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
