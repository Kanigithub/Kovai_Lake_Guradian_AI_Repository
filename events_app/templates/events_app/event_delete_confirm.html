{% extends "base.html" %}
{% block title %}Delete Event{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-danger border-2">
      <div class="card-header bg-danger text-white py-3">
        <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h4>
      </div>
      <div class="card-body p-4 text-center">
        <p class="fs-5">Are you sure you want to delete <strong>{{ event.title }}</strong>?</p>
        <p class="text-muted">This will remove all registrations for this event. This action cannot be undone.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-danger">
              <i class="fas fa-trash me-1"></i>Yes, Delete
            </button>
            <a href="{% url 'events_app:event_detail' event.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
