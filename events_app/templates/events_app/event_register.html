{% extends "base.html" %}
{% block title %}Register for {{ event.title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow border-0">
      <div class="card-header bg-success text-white py-3">
        <h4 class="mb-0"><i class="fas fa-user-plus me-2"></i>Register for Event</h4>
      </div>
      <div class="card-body p-4">
        <h5 class="fw-bold">{{ event.title }}</h5>
        <p class="text-muted"><i class="fas fa-calendar me-1"></i>{{ event.date }} at {{ event.start_time }}</p>
        <p class="text-muted"><i class="fas fa-map-marker-alt me-1"></i>{{ event.location }}</p>
        <hr>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Select a Role (optional)</label>
            {{ form.role }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">
              <i class="fas fa-check me-2"></i>Confirm Registration
            </button>
            <a href="{% url 'events_app:event_detail' event.pk %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
