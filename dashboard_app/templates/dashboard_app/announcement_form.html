{% extends "base.html" %}
{% block title %}{{ action }} Announcement â€” Dashboard{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow border-0">
      <div class="card-header bg-warning py-3">
        <h4 class="mb-0"><i class="fas fa-bullhorn me-2"></i>{{ action }} Announcement</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            {{ form.title }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Content</label>
            {{ form.content }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Link to Event (optional)</label>
            {{ form.event }}
          </div>
          <div class="mb-3 form-check">
            {{ form.is_published }}
            <label class="form-check-label fw-semibold">Publish immediately</label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">
              <i class="fas fa-paper-plane me-2"></i>{{ action }} Announcement
            </button>
            <a href="{% url 'dashboard_app:organizer_dashboard' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
