{% extends "base.html" %}
{% block title %}Confirm Delete{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white fw-bold">
        <i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete
      </div>
      <div class="card-body text-center py-4">
        <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
        <p class="fs-5">Are you sure you want to delete:</p>
        <p class="fw-bold text-danger fs-5">"{{ object_name }}"</p>
        <p class="text-muted small">This action cannot be undone.</p>
        <div class="d-flex gap-3 justify-content-center mt-3">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4"><i class="fas fa-trash me-2"></i>Yes, Delete</button>
          </form>
          <a href="{% url cancel_url %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
