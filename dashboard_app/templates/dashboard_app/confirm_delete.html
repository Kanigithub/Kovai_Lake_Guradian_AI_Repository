{% extends "base.html" %}
{% block title %}Confirm Delete — Kovai Lake Guardians{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card border-0 shadow text-center p-5">
      <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
      <h4 class="fw-bold mb-2">Delete Confirmation</h4>
      <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ object_name }}</strong>? This action cannot be undone.</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger fw-bold px-4 me-2">Yes, Delete</button>
        <a href="{{ cancel_url }}" class="btn btn-outline-secondary fw-bold px-4">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
